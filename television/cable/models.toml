[metadata]
name = "models"
description = "Browse Envoy server model files"

[source]
# List all files one level deep in the models subdirectories
command = "find /Users/michaelschneider/code/envoy-web/server/models -mindepth 2 -maxdepth 2 -type f"
# Display just the filename (last path segment)
display = "{split:/:-1}"

[preview]
# Show the file contents with syntax highlighting
command = "bat --style=numbers --color=always '{}'"

[ui]
orientation = "landscape"
preview_panel = { "size" = 60, "scrollbar" = true }
